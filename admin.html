<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Chic Mood</title>
  <style>
    :root{--bg:#f8efe4;--bg2:#fffaf3;--card:#fffdf8;--gold:#a87936;--gold2:#c08a3e;--text:#4f3b2d;--muted:#8b7565;--line:rgba(168,121,54,.25);--shadow:0 18px 45px rgba(89,55,24,.12);--radius:24px}
    *{box-sizing:border-box}
    body{margin:0;font-family:Georgia,'Times New Roman',serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text)}
    body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 20%,rgba(168,121,54,.12),transparent 32%),radial-gradient(circle at 85% 0%,rgba(255,255,255,.9),transparent 30%);pointer-events:none;z-index:-1}
    header{position:sticky;top:0;background:rgba(255,250,243,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:10}
    .nav{max-width:1180px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:18px}
    .brand{font-size:34px;color:var(--gold);font-style:italic;letter-spacing:-1px;white-space:nowrap}
    nav{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}
    nav a,button{font-family:inherit}
    nav a{color:var(--text);text-decoration:none;font-size:16px}
    .cartBtn,.primary{border:1px solid var(--line);background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-radius:999px;padding:11px 18px;cursor:pointer;box-shadow:0 8px 18px rgba(168,121,54,.18)}
    .wrap{max-width:1180px;margin:0 auto;padding:20px}
    .panel{background:rgba(255,253,248,.72);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:28px}
    .chip,select,input,textarea{border:1px solid var(--line);background:#fffaf3;color:var(--text);border-radius:999px;padding:12px 16px;font-size:15px}
    select{min-width:220px}
    .formGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .formGrid .full{grid-column:1/-1}
    .admin input,.admin select,.admin textarea{width:100%;border-radius:14px}
    .admin textarea{min-height:90px}
    .listAdmin{display:grid;gap:16px;margin-top:22px}
    .adminProduct{display:grid;grid-template-columns:76px 1fr auto;gap:16px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 4px 10px rgba(0,0,0,0.035)}
    .adminProduct img{width:76px;height:76px;min-width:76px;max-width:76px;object-fit:cover;border-radius:12px;display:block}
    .adminProduct .prod-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    
    .danger{background:#fff;color:#9b2f2f;border:1px solid rgba(155,47,47,.25);border-radius:999px;padding:10px 14px;cursor:pointer;white-space:nowrap}
    .ghost{background:#fff;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:10px 14px;cursor:pointer;white-space:nowrap}
    
    /* BOTÃO DE REGISTRAR VENDA RÁPIDA */
    .success{background:#4a7c59;color:#fff;border:1px solid rgba(74,124,89,.25);border-radius:999px;padding:10px 14px;cursor:pointer;white-space:nowrap;box-shadow:0 4px 10px rgba(74,124,89,.15)}
    
    .previewImgs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
    .previewImgs img{width:70px;height:70px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
    .previewVideo video{max-width:220px;max-height:160px;border-radius:14px;border:1px solid var(--line)}
    
    @media(max-width:760px){
      .nav{align-items:flex-start}.brand{font-size:28px}nav{gap:8px}
      .formGrid{grid-template-columns:1fr}
      .adminProduct{grid-template-columns:1fr;text-align:center;justify-items:center;padding:16px}
      .adminProduct img{width:90px;height:90px;min-width:90px;max-width:90px}
      .adminProduct .prod-actions{width:100%;justify-content:center;margin-top:12px}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header><div class="nav"><div class="brand">Chic Mood Dashboard</div><nav><a href="index.html">Ver loja</a></nav></div></header>
  <main class="admin">
    <section id="loginBox" class="panel">
      <h1>Dashboard Chic Mood</h1>
      <p>Digite a senha para editar produtos.</p>
      <input id="pass" type="password" placeholder="Senha"><br><br>
      <button class="primary" onclick="login()">Entrar</button>
    </section>
    
    <section id="adminBox" class="panel" style="display:none">
      <h1>Produtos</h1>
      <p>Gerencie o catálogo, códigos internos, estoque real e preços de custo da sua marca.</p>
      <div class="formGrid">
        <input id="name" placeholder="Nome do produto">
        <input id="price" placeholder="Preço de Venda. Ex: 89.90" inputmode="decimal">
        
        <input id="codigo" placeholder="Código do Produto (Ex: BR-001)">
        <input id="quantidade" type="number" placeholder="Quantidade em Estoque" min="0" value="1">
        <input id="precoCusto" placeholder="Preço de Custo (Opcional). Ex: 32.50" inputmode="decimal">
        
        <select id="category">
          <option value="semijoias">Semijoias</option>
          <option value="perfumes">Perfumes</option>
        </select>
        <input class="full" id="subcategory" placeholder="Subcategoria. Ex: Colares, Anéis, Natura, Eudora">
        <input class="full" id="photos" type="file" accept="image/*" multiple>
        <div id="previewImgs" class="previewImgs full"></div>
        <input class="full" id="videoUrl" placeholder="Link do vídeo do produto. Ex: arquivo .mp4">
        <input class="full" id="videoFile" type="file" accept="video/*">
        <div id="previewVideo" class="previewVideo full"></div>
        <textarea class="full" id="shortDescription" placeholder="Descrição curta para o card do produto"></textarea>
        <textarea class="full" id="description" placeholder="Descrição completa para a página do produto"></textarea>
        <button class="primary full" onclick="saveProduct()">Salvar produto</button>
        <button class="ghost full" onclick="clearForm()">Limpar formulário</button>
      </div>
      <div id="adminList" class="listAdmin"></div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = 'https://lzldwlppfeokgrevbjvu.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_omT8tL8IwMBZmolX_MdNSA_L4oca79k';
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const ADMIN_PASSWORD='px0507cx';
    let editingId=null; let editingImages=[]; let editingVideo=''; let localSelectedFiles=[];
    const fallbackImg='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600"><rect width="100%" height="100%" fill="#f3dfc6"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#a87936" font-family="serif" font-size="44">Chic Mood</text></svg>`);

    async function fetchProductsFromNuvem(){
      const { data, error } = await db.from('produtos').select('*').order('id', { ascending: false });
      if(error) { console.error(error); return []; }
      return data;
    }
    
    function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
    function login(){if(document.getElementById('pass').value===ADMIN_PASSWORD){localStorage.setItem('chicMoodLogged','yes');showAdmin()}else alert('Senha incorreta')}
    function showAdmin(){document.getElementById('loginBox').style.display='none';document.getElementById('adminBox').style.display='block';renderAdmin()}
    
    function clearForm(){
      editingId=null; editingImages=[]; editingVideo=''; localSelectedFiles=[];
      ['name','price','subcategory','shortDescription','description','photos','videoUrl','videoFile','codigo','quantidade','precoCusto'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('category').value='semijoias';
      renderPreview(); renderVideoPreview();
    }
    
    function renderPreview(){document.getElementById('previewImgs').innerHTML=editingImages.map((img,i)=>`<div><img src="${img}"><br><button class="danger" onclick="removeImg(${i})">Remover</button></div>`).join('')}
    function removeImg(i){editingImages.splice(i,1);renderPreview()}

    document.getElementById('photos').addEventListener('change', async function(){
      const files=[...this.files]; if(!files.length)return;
      for(const f of files){
        localSelectedFiles.push(f);
        editingImages.push(await fileToData(f));
      }
      renderPreview();
    });

    function renderVideoPreview(){const box=document.getElementById('previewVideo');const url=document.getElementById('videoUrl').value.trim();const src=editingVideo||url;if(!src){box.innerHTML='';return}box.innerHTML=src.startsWith('data:video')||src.match(/\.(mp4|webm|ogg)(\?|$)/i)?`<video controls src="${src}"></video><br><button class="danger" onclick="removeVideo()">Remover vídeo</button>`:`<div class="videoBadge">Vídeo cadastrado</div><br><a href="${src}" target="_blank">Abrir vídeo</a><br><button class="danger" onclick="removeVideo()">Remover vídeo</button>`}
    function removeVideo(){editingVideo='';document.getElementById('videoUrl').value='';document.getElementById('videoFile').value='';renderVideoPreview()}
    document.getElementById('videoUrl').addEventListener('input',()=>{if(document.getElementById('videoUrl').value.trim())editingVideo='';renderVideoPreview()});
    document.getElementById('videoFile').addEventListener('change',async function(){const f=this.files[0];if(!f)return;if(f.size>12*1024*1024){alert('Vídeo muito pesado. Até 12MB.');this.value='';return}editingVideo=await fileToData(f);document.getElementById('videoUrl').value='';renderVideoPreview()});
    function fileToData(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file)})}

    async function saveProduct(){
      const name=document.getElementById('name').value.trim();
      const price=parseFloat(String(document.getElementById('price').value).replace(',','.'));
      const category=document.getElementById('category').value;
      const subcategory=document.getElementById('subcategory').value.trim()||'Sem subcategoria';
      const shortDescription=document.getElementById('shortDescription').value.trim();
      const description=document.getElementById('description').value.trim();
      const video=(editingVideo||document.getElementById('videoUrl').value.trim());
      
      // Captura dos novos inputs de estoque
      const codigo=document.getElementById('codigo').value.trim()||null;
      const quantidade=parseInt(document.getElementById('quantidade').value)||0;
      const precoCustoRaw=document.getElementById('precoCusto').value.trim();
      const preco_custo=precoCustoRaw ? parseFloat(precoCustoRaw.replace(',','.')) : null;

      if(!name||isNaN(price)){alert('Informe nome e preço válidos.');return}

      let finalImages = editingImages.filter(img => !img.startsWith('data:image'));

      if(localSelectedFiles.length > 0) {
        for(const file of localSelectedFiles) {
          const uniqueName = `${Date.now()}_${file.name}`;
          const { data, error } = await db.storage.from('fotos-produtos').upload(uniqueName, file);
          if(!error) {
            const { data: publicData } = db.storage.from('fotos-produtos').getPublicUrl(uniqueName);
            finalImages.push(publicData.publicUrl);
          }
        }
      }

      if(finalImages.length === 0) finalImages = [fallbackImg];

      const payload = { name, price, category, subcategory, shortDescription, description, images: finalImages, video, codigo, quantidade, preco_custo };

      if(editingId){
        const { error } = await db.from('produtos').update(payload).eq('id', editingId);
        if(error) alert('Erro ao atualizar: ' + error.message);
      } else {
        const { error } = await db.from('produtos').insert([payload]);
        if(error) alert('Erro ao cadastrar: ' + error.message);
      }

      clearForm();
      await renderAdmin();
      alert('Produto salvo com sucesso!');
    }

    async function editProduct(id){
      const ps = await fetchProductsFromNuvem();
      const p=ps.find(x=>x.id===id); if(!p)return;
      editingId=id; editingImages=[...(p.images||[])]; editingVideo=p.video||'';
      document.getElementById('name').value=p.name; document.getElementById('price').value=p.price;
      document.getElementById('category').value=p.category; document.getElementById('subcategory').value=p.subcategory||'';
      document.getElementById('shortDescription').value=p.shortDescription||''; document.getElementById('description').value=p.description||'';
      document.getElementById('videoUrl').value=(p.video&& !p.video.startsWith('data:'))?p.video:'';
      
      // Carrega os novos dados de estoque no formulário
      document.getElementById('codigo').value=p.codigo||'';
      document.getElementById('quantidade').value=p.quantidade!==undefined?p.quantidade:0;
      document.getElementById('precoCusto').value=p.preco_custo||'';
      
      renderPreview(); renderVideoPreview(); window.scrollTo({top:0,behavior:'smooth'})
    }

    // REGISTRAR UMA VENDA RAPIDAMENTE (-1 UNIDADE)
    async function registrarVenda(id){
      const ps = await fetchProductsFromNuvem();
      const p = ps.find(x=>x.id===id);
      if(!p) return;
      let novaQtd = (p.quantidade || 0) - 1;
      if(novaQtd < 0) { alert('O estoque desse produto já está zerado!'); return; }
      
      const { error } = await db.from('produtos').update({ quantidade: novaQtd }).eq('id', id);
      if(!error) {
        await renderAdmin();
      } else {
        alert('Erro ao registrar venda: ' + error.message);
      }
    }

    async function deleteProduct(id){
      if(confirm('Excluir este produto permanentemente da nuvem?')){
        const { error } = await db.from('produtos').delete().eq('id', id);
        if(!error) await renderAdmin();
        else alert(error.message);
      }
    }

    async function renderAdmin(){
      const ps= await fetchProductsFromNuvem();
      document.getElementById('adminList').innerHTML=ps.map(p=>{
        const qtd = p.quantidade !== undefined && p.quantidade !== null ? p.quantidade : 0;
        const estoqueStatus = qtd === 0 ? '<b style="color:#9b2f2f">ZERADO (Fora de estoque)</b>' : `<b>${qtd} un</b>`;
        const custoInfo = p.preco_custo ? `| Custo: ${money(p.preco_custo)}` : '';
        const codigoInfo = p.codigo ? `Código: ${p.codigo}` : 'Sem código';
        
        return `<div class="adminProduct">
          <img src="${p.images?.[0]||fallbackImg}">
          <div>
            <b>${p.name}</b><br>
            <small>${p.category==='semijoias'?'Semijoias':'Perfumes'} • ${p.subcategory||'Sem subcategoria'}</small><br>
            <small style="color:var(--gold)">${codigoInfo} | Estoque: ${estoqueStatus} ${custoInfo}</small><br>
            <strong>${money(p.price)}</strong>
          </div>
          <div class="prod-actions">
            <button class="success" onclick="registrarVenda(${p.id})">Vendido (-1)</button>
            <button class="ghost" onclick="editProduct(${p.id})">Editar</button> 
            <button class="danger" onclick="deleteProduct(${p.id})">Excluir</button>
          </div>
        </div>`
      }).join('')
    }
    if(localStorage.getItem('chicMoodLogged')==='yes') showAdmin();
  </script>
</body>
</html>
