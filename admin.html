<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dashboard Chic Mood</title><style>
:root{--bg:#f8efe4;--bg2:#fffaf3;--card:#fffdf8;--gold:#a87936;--gold2:#c08a3e;--text:#4f3b2d;--muted:#8b7565;--line:rgba(168,121,54,.25);--shadow:0 18px 45px rgba(89,55,24,.12);--radius:24px}*{box-sizing:border-box}body{margin:0;font-family:Georgia,'Times New Roman',serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--text)}body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 20%,rgba(168,121,54,.12),transparent 32%),radial-gradient(circle at 85% 0%,rgba(255,255,255,.9),transparent 30%);pointer-events:none;z-index:-1}header{position:sticky;top:0;background:rgba(255,250,243,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:10}.nav{max-width:1180px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:18px}.brand{font-size:34px;color:var(--gold);font-style:italic;letter-spacing:-1px;white-space:nowrap}nav{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:flex-end}nav a,button{font-family:inherit}nav a{color:var(--text);text-decoration:none;font-size:16px}.cartBtn,.primary{border:1px solid var(--line);background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border-radius:999px;padding:11px 18px;cursor:pointer;box-shadow:0 8px 18px rgba(168,121,54,.18)}.cartBtn span{background:#fff;color:var(--gold);border-radius:50%;display:inline-flex;width:22px;height:22px;align-items:center;justify-content:center;margin-left:7px;font-size:13px}.hero{max-width:1180px;margin:0 auto;padding:54px 20px 30px;text-align:center}.kicker{letter-spacing:9px;color:var(--gold);font-size:13px;text-transform:uppercase}.hero h1{font-size:46px;margin:14px 0 8px;color:var(--gold);font-style:italic;font-weight:400}.hero p{max-width:680px;margin:0 auto;color:var(--muted);font-size:18px;line-height:1.6}.wrap{max-width:1180px;margin:0 auto;padding:20px}.panel{background:rgba(255,253,248,.72);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:28px}.sectionTitle{text-align:center;margin:0 0 18px}.sectionTitle .small{letter-spacing:8px;color:var(--gold);font-size:12px;text-transform:uppercase}.sectionTitle h2{margin:8px 0 0;color:var(--gold);font-size:42px;font-style:italic;font-weight:400}.filters{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:20px 0 28px}.chip,select,input,textarea{border:1px solid var(--line);background:#fffaf3;color:var(--text);border-radius:999px;padding:12px 16px;font-size:15px}.chip{cursor:pointer}.chip.active{background:var(--gold);color:#fff}select{min-width:220px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px}.product{background:var(--card);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 14px 28px rgba(89,55,24,.08);cursor:pointer;transition:.2s}.product:hover{transform:translateY(-3px)}.product img{width:100%;height:230px;object-fit:cover;background:#f2e3d0}.product .info{padding:16px}.cat{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--gold)}.product h3{margin:8px 0 4px;font-size:20px}.sub{color:var(--muted);font-size:14px}.price{font-weight:bold;color:var(--gold);font-size:22px;margin:12px 0}.product button{width:100%}.drawer,.modal{position:fixed;inset:0;display:none;z-index:20}.drawer.open,.modal.open{display:block}.overlay{position:absolute;inset:0;background:rgba(41,28,17,.42)}.cart{position:absolute;right:0;top:0;height:100%;width:min(460px,94vw);background:#fffaf3;box-shadow:-18px 0 40px rgba(0,0,0,.16);padding:24px;overflow:auto}.cart h2{color:var(--gold);font-style:italic;font-size:38px;font-weight:400;margin:0 0 16px}.close{float:right;border:0;background:transparent;font-size:30px;color:var(--gold);cursor:pointer}.item{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center;border-bottom:1px solid var(--line);padding:12px 0}.item img{width:64px;height:64px;object-fit:cover;border-radius:12px}.qty{display:flex;gap:6px;align-items:center}.qty button{border:1px solid var(--line);background:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer}.totals{margin-top:18px;border-top:1px solid var(--line);padding-top:16px}.freteBox{margin-top:16px;padding:16px;background:#fff;border:1px solid var(--line);border-radius:18px}.freteBox input{width:100%;border-radius:14px;margin:10px 0}.freteResult{color:var(--muted);line-height:1.5}.whats{display:block;text-align:center;text-decoration:none;margin-top:16px;border-radius:999px;padding:14px;background:#25d366;color:#fff;font-weight:bold}.adminHint{text-align:center;color:var(--muted);font-size:13px;margin:30px 0}.empty{text-align:center;color:var(--muted);padding:34px}.details{position:relative;z-index:2;margin:4vh auto;background:#fffaf3;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);max-width:980px;max-height:92vh;overflow:auto;padding:22px}.detailsGrid{display:grid;grid-template-columns:1.1fr .9fr;gap:24px}.mainPhoto{width:100%;height:520px;object-fit:cover;border-radius:22px;background:#f2e3d0}.thumbs{display:flex;gap:10px;overflow:auto;margin-top:10px}.thumbs img{width:78px;height:78px;object-fit:cover;border-radius:12px;border:2px solid transparent;cursor:pointer}.thumbs img.active{border-color:var(--gold)}.details h2{font-size:38px;color:var(--gold);font-style:italic;font-weight:400;margin:8px 0}.desc{white-space:pre-wrap;line-height:1.7;color:var(--muted)}.admin{max-width:980px;margin:0 auto;padding:24px}.admin h1{color:var(--gold);font-style:italic;font-weight:400}.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.formGrid .full{grid-column:1/-1}.admin input,.admin select,.admin textarea{width:100%;border-radius:14px}.admin textarea{min-height:90px}.listAdmin{display:grid;gap:12px;margin-top:22px}.adminProduct{display:grid;grid-template-columns:76px 1fr auto;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:10px}.adminProduct img{width:76px;height:76px;object-fit:cover;border-radius:12px}.danger{background:#fff;color:#9b2f2f;border:1px solid rgba(155,47,47,.25);border-radius:999px;padding:10px 14px;cursor:pointer}.ghost{background:#fff;color:var(--gold);border:1px solid var(--line);border-radius:999px;padding:10px 14px;cursor:pointer}.previewImgs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.previewImgs img{width:70px;height:70px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}.videoBox{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.videoBox video,.videoBox iframe{width:100%;max-height:420px;border:0;border-radius:14px;background:#000}.videoBox a{color:var(--gold);font-weight:bold}.videoBadge{display:inline-block;margin-top:4px;color:var(--gold);font-size:12px;letter-spacing:1px;text-transform:uppercase}.previewVideo{margin:8px 0}.previewVideo video{max-width:220px;max-height:160px;border-radius:14px;border:1px solid var(--line)}@media(max-width:760px){.nav{align-items:flex-start}.brand{font-size:28px}nav{gap:8px}.hero h1{font-size:36px}.formGrid,.detailsGrid{grid-template-columns:1fr}.sectionTitle h2{font-size:34px}.mainPhoto{height:360px}.cart{width:96vw}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head><body>
<header><div class="nav"><div class="brand">Chic Mood Dashboard</div><nav><a href="index.html">Ver loja</a></nav></div></header><main class="admin"><section id="loginBox" class="panel"><h1>Dashboard Chic Mood</h1><p>Digite a senha para editar produtos.</p><input id="pass" type="password" placeholder="Senha"><br><br><button class="primary" onclick="login()">Entrar</button></section>
<section id="adminBox" class="panel" style="display:none"><h1>Produtos</h1><p>Cadastre várias fotos, descrição completa, categoria e subcategoria. A subcategoria pode ser marca, tipo ou coleção.</p><div class="formGrid"><input id="name" placeholder="Nome do produto"><input id="price" placeholder="Preço. Ex: 89.90" inputmode="decimal"><select id="category"><option value="semijoias">Semijoias</option><option value="perfumes">Perfumes</option></select><input id="subcategory" placeholder="Subcategoria. Ex: Colares, Anéis, Natura, Eudora"><input class="full" id="photos" type="file" accept="image/*" multiple><div id="previewImgs" class="previewImgs full"></div><input class="full" id="videoUrl" placeholder="Link do vídeo do produto. Ex: YouTube, Instagram, TikTok ou arquivo .mp4"><input class="full" id="videoFile" type="file" accept="video/*"><div id="previewVideo" class="previewVideo full"></div><textarea class="full" id="shortDescription" placeholder="Descrição curta para o card do produto"></textarea><textarea class="full" id="description" placeholder="Descrição completa para a página do produto"></textarea><button class="primary full" onclick="saveProduct()">Salvar produto</button><button class="ghost full" onclick="clearForm()">Limpar formulário</button></div><div id="adminList" class="listAdmin"></div></section></main>
<script>
const SUPABASE_URL = 'https://lzldwlppfeokgrevbjvu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_omT8tL8IwMBZmolX_MdNSA_L4oca79k';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASSWORD='px0507cx';let editingId=null;let editingImages=[];let editingVideo='';let localSelectedFiles=[];
const fallbackImg='data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600"><rect width="100%" height="100%" fill="#f3dfc6"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#a87936" font-family="serif" font-size="44">Chic Mood</text></svg>`);

async function fetchProductsFromNuvem(){
  const { data, error } = await supabase.from('produtos').select('*').order('id', { ascending: false });
  if(error) { console.error(error); return []; }
  return data;
}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function login(){if(document.getElementById('pass').value===ADMIN_PASSWORD){localStorage.setItem('chicMoodLogged','yes');showAdmin()}else alert('Senha incorreta')}
function showAdmin(){document.getElementById('loginBox').style.display='none';document.getElementById('adminBox').style.display='block';renderAdmin()}
function clearForm(){editingId=null;editingImages=[];editingVideo='';localSelectedFiles=[];['name','price','subcategory','shortDescription','description','photos','videoUrl','videoFile'].forEach(id=>document.getElementById(id).value='');document.getElementById('category').value='semijoias';renderPreview();renderVideoPreview()}
function renderPreview(){document.getElementById('previewImgs').innerHTML=editingImages.map((img,i)=>`<div><img src="${img}"><br><button class="danger" onclick="removeImg(${i})">Remover</button></div>`).join('')}
function removeImg(i){editingImages.splice(i,1);renderPreview()}

document.getElementById('photos').addEventListener('change', async function(){
  const files=[...this.files];if(!files.length)return;
  for(const f of files){
    localSelectedFiles.push(f);
    editingImages.push(await fileToData(f));
  }
  renderPreview();
});

function renderVideoPreview(){const box=document.getElementById('previewVideo');const url=document.getElementById('videoUrl').value.trim();const src=editingVideo||url;if(!src){box.innerHTML='';return}box.innerHTML=src.startsWith('data:video')||src.match(/\.(mp4|webm|ogg)(\?|$)/i)?`<video controls src="${src}"></video><br><button class="danger" onclick="removeVideo()">Remover vídeo</button>`:`<div class="videoBadge">Vídeo cadastrado</div><br><a href="${src}" target="_blank">Abrir vídeo</a><br><button class="danger" onclick="removeVideo()">Remover vídeo</button>`}
function removeVideo(){editingVideo='';document.getElementById('videoUrl').value='';document.getElementById('videoFile').value='';renderVideoPreview()}
document.getElementById('videoUrl').addEventListener('input',()=>{if(document.getElementById('videoUrl').value.trim())editingVideo='';renderVideoPreview()});
document.getElementById('videoFile').addEventListener('change',async function(){const f=this.files[0];if(!f)return;if(f.size>12*1024*1024){alert('Vídeo muito pesado. Use um vídeo curto, até 12MB, ou cole um link.');this.value='';return}editingVideo=await fileToData(f);document.getElementById('videoUrl').value='';renderVideoPreview()});
function fileToData(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file)})}

async function saveProduct(){
  const name=document.getElementById('name').value.trim();
  const price=parseFloat(String(document.getElementById('price').value).replace(',','.'));
  const category=document.getElementById('category').value;
  const subcategory=document.getElementById('subcategory').value.trim()||'Sem subcategoria';
  const shortDescription=document.getElementById('shortDescription').value.trim();
  const description=document.getElementById('description').value.trim();
  const video=(editingVideo||document.getElementById('videoUrl').value.trim());
  if(!name||!price){alert('Informe nome e preço.');return}

  let finalImages = editingImages.filter(img => !img.startsWith('data:image'));

  if(localSelectedFiles.length > 0) {
    for(const file of localSelectedFiles) {
      const uniqueName = `${Date.now()}_${file.name}`;
      const { data, error } = await supabase.storage.from('fotos-produtos').upload(uniqueName, file);
      if(!error) {
        const { data: publicData } = supabase.storage.from('fotos-produtos').getPublicUrl(uniqueName);
        finalImages.push(publicData.publicUrl);
      } else {
        console.error("Erro no upload:", error);
      }
    }
  }

  if(finalImages.length === 0) finalImages = [fallbackImg];

  const payload = { name, price, category, subcategory, shortDescription, description, images: finalImages, video };

  if(editingId){
    const { error } = await supabase.from('produtos').update(payload).eq('id', editingId);
    if(error) alert('Erro ao atualizar: ' + error.message);
  } else {
    const { error } = await supabase.from('produtos').insert([payload]);
    if(error) alert('Erro ao cadastrar: ' + error.message);
  }

  clearForm();
  await renderAdmin();
  alert('Produto salvo com sucesso!');
}

async function editProduct(id){
  const ps = await fetchProductsFromNuvem();
  const p=ps.find(x=>x.id===id);if(!p)return;
  editingId=id;editingImages=[...(p.images||[])];editingVideo=p.video||'';
  document.getElementById('name').value=p.name;document.getElementById('price').value=p.price;
  document.getElementById('category').value=p.category;document.getElementById('subcategory').value=p.subcategory||'';
  document.getElementById('shortDescription').value=p.shortDescription||'';document.getElementById('description').value=p.description||'';
  document.getElementById('videoUrl').value=(p.video&& !p.video.startsWith('data:'))?p.video:'';
  renderPreview();renderVideoPreview();window.scrollTo({top:0,behavior:'smooth'})
}

async function deleteProduct(id){
  if(confirm('Excluir este produto permanentemente da nuvem?')){
    const { error } = await supabase.from('produtos').delete().eq('id', id);
    if(!error) await renderAdmin();
    else alert(error.message);
  }
}

async function renderAdmin(){
  const ps= await fetchProductsFromNuvem();
  document.getElementById('adminList').innerHTML=ps.map(p=>`<div class="adminProduct"><img src="${p.images?.[0]||fallbackImg}"><div><b>${p.name}</b><br><small>${p.category==='semijoias'?'Semijoias':'Perfumes'} • ${p.subcategory||'Sem subcategoria'} • ${p.images?.length||1} foto(s) ${p.video?'• vídeo':''}</small><br>${money(p.price)}</div><div><button class="ghost" onclick="editProduct(${p.id})">Editar</button> <button class="danger" onclick="deleteProduct(${p.id})">Excluir</button></div></div>`).join('')
}
if(localStorage.getItem('chicMoodLogged')==='yes') showAdmin();
</script></body></html>
